<div class="flex flex-col h-screen overflow-hidden bg-white dark:bg-slate-950">
  <app-nav class="flex-none sticky top-0 z-50" />

  <main class="flex-1 overflow-y-auto">
    <router-outlet></router-outlet>
  </main>
</div>

@if (toastService.activeToast(); as toast) {
<div class="fixed top-5 right-5 z-[100] pointer-events-auto">
  <div
    class="flex items-center gap-3 max-w-md p-4 rounded-xl shadow-2xl transition-all duration-300 transform border animate-in slide-in-from-top-5 text-sm"
    [ngClass]="{
        'bg-red-950 border-red-800 text-red-200': toast.type === 'error',
        'bg-emerald-950 border-emerald-800 text-emerald-200': toast.type === 'success',
        'bg-slate-900 border-slate-800 text-slate-200': toast.type === 'info'
      }">

    @if (toast.type === 'error') {
    <span class="text-red-400 font-bold text-lg">⚠️</span>
    }

    <p class="font-medium flex-1 leading-snug">{{ toast.message }}</p>

    <button (click)="toastService.clear()"
      class="p-1 rounded-md hover:bg-white/10 transition-colors opacity-70 hover:opacity-100 text-base font-bold">
      ×
    </button>
  </div>
</div>
}

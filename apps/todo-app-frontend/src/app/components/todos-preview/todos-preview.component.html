<div class="max-w-5xl mx-auto mt-12 p-6 text-gray-100">

    <div class="mb-8">
        <h1
            class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
            Your Task Spaces
        </h1>
        <p class="text-sm text-gray-400 mt-1">Select an active workspace to manage tasks or create a new one.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

        <div (click)="createBlankNewList()"
            class="group flex flex-col items-center justify-center p-6 bg-transparent border-2 border-dashed border-gray-700 hover:border-indigo-500/60 rounded-2xl cursor-pointer hover:bg-gray-800/20 transition-all duration-300 min-h-[220px]">

            <div
                class="w-12 h-12 rounded-full bg-gray-800/80 border border-gray-700 flex items-center justify-center group-hover:bg-indigo-900/40 group-hover:border-indigo-500 transition-all duration-300 shadow-md">
                <svg class="w-6 h-6 text-gray-400 group-hover:text-indigo-400 transition-colors" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
            </div>

            <span class="mt-4 text-sm font-semibold text-gray-400 group-hover:text-indigo-400 transition-colors">
                Create New List
            </span>
            <p class="text-xs text-gray-600 mt-1 text-center max-w-[180px]">Initialize an entirely fresh Todo List
                and assign custom tasks.</p>
        </div>
        @for (list of todoLists(); track list.id) {
        <div [routerLink]="['/todos', list.id]"
            class="group relative flex flex-col justify-between p-5 bg-gray-800/40 border border-gray-700/60 rounded-2xl hover:border-indigo-500/50 hover:bg-gray-800/80 transition-all duration-300 cursor-pointer hover:shadow-lg hover:shadow-indigo-950/20">
            <div>
                <div class="flex items-center mb-4">
                    <span
                        class="text-xl p-2 bg-gray-800 rounded-xl group-hover:scale-110 group-hover:bg-indigo-950/50 group-hover:text-indigo-400 transition-all duration-300 text-gray-400">
                        📝
                    </span>
                </div>

                <h3 class="text-lg font-bold text-gray-100 group-hover:text-indigo-400 transition-colors line-clamp-2">
                    {{ list.name }}
                </h3>
            </div>

            <div class="mt-6 pt-4 border-t border-gray-700/40 flex items-center justify-between text-xs text-gray-500">
                <div class="flex flex-col gap-0.5">
                    <span class="text-[10px] text-gray-600 uppercase tracking-wider font-semibold">Created On</span>
                    <span class="text-gray-400 font-medium">{{ list.createdAt | date:'mediumDate' }}</span>
                </div>

                <span
                    class="text-gray-600 group-hover:text-indigo-400 group-hover:translate-x-1 transition-all duration-300">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                    </svg>
                </span>
            </div>

        </div>
        }
    </div>
</div>

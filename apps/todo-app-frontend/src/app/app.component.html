<div class="flex flex-col h-screen overflow-hidden bg-white dark:bg-slate-950">
  <app-nav class="flex-none sticky top-0 z-50" />

  <main class="flex-1 overflow-y-auto">
    <router-outlet></router-outlet>
  </main>
</div>

@if (toastService.activeToast(); as toast) {
<div
  class="fixed top-5 right-5 z-[100] flex items-center gap-3 max-w-md p-4 rounded-xl shadow-2xl border text-sm animate-in slide-in-from-top-5 duration-300"
  [ngClass]="{
      'bg-red-950 border-red-800 text-red-200': toast.type === 'error',
      'bg-emerald-950 border-emerald-800 text-emerald-200': toast.type === 'success',
      'bg-slate-900 border-slate-800 text-slate-200': toast.type === 'info'
    }">

  @if (toast.type === 'error') {
  <span class="text-red-400 font-bold text-lg">⚠️</span>
  }

  <p class="font-medium flex-1 leading-snug text-left">{{ toast.message }}</p>
</div>
}
